<head>

  <title>Sign In — Inkomoko</title>
  <meta name="description" content="Sign in or create an account to start preserving or discovering oral histories.">
  <link rel="stylesheet" href="/css/styles.css?v=4">
  <link rel="manifest" href="/manifest.json">

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "secondary-fixed": "#ffdbcc",
                        "on-surface": "#1c1c13",
                        "outline-variant": "#e1bfb5",
                        "on-secondary": "#ffffff",
                        "inverse-primary": "#ffb59d",
                        "error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#cec4ca",
                        "on-primary-container": "#ffece7",
                        "primary-container": "#c2410c",
                        "secondary-container": "#feb28f",
                        "background": "#fdf9e9",
                        "on-error-container": "#93000a",
                        "on-tertiary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "inverse-on-surface": "#f5f1e1",
                        "surface-tint": "#ac3400",
                        "primary": "#9b2f00",
                        "secondary": "#895033",
                        "on-primary": "#ffffff",
                        "on-tertiary-container": "#f8edf3",
                        "secondary-fixed-dim": "#ffb694",
                        "surface-container-highest": "#e6e3d3",
                        "on-tertiary-fixed": "#1f1a1e",
                        "surface-variant": "#e6e3d3",
                        "on-secondary-container": "#794227",
                        "primary-fixed-dim": "#ffb59d",
                        "surface-container-low": "#f8f4e4",
                        "primary-fixed": "#ffdbd0",

                        "on-secondary-fixed": "#351000",

<style>
        .material-symbols-outlined {
            font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
        }
        .leaf-radius {
            border-radius: 1.5rem 0.5rem 1.5rem 0.5rem;
        }
        .terracotta-glow {
            background: linear-gradient(135deg, #9b2f00 0%, #c2410c 100%);
        }
        .glass-header {
            background: rgba(253, 249, 233, 0.8);
            backdrop-filter: blur(12px);
        }
</style>
</head>
<body>
  <header class="fixed top-0 w-full z-50 glass-header shadow-sm shadow-on-surface/5" id="topAppBar">
<div class="flex justify-between items-center w-full px-6 py-4">
<div class="flex items-center gap-4">
<button onclick="if(window.history.length > 1 && window.location.pathname !== '/') { window.history.back(); } else { Components.toggleDrawer(); }" class="text-primary hover:bg-surface-container-low p-2 rounded-full transition-colors duration-300">
<span class="material-symbols-outlined">menu</span>
</button>
<h1 class="font-headline text-2xl font-black text-primary tracking-tight" style="cursor:pointer" onclick="window.location.href='/'">The Living Archive</h1>
</div>
<div class="hidden md:flex items-center gap-8">
<nav class="flex gap-6 font-label text-sm font-medium uppercase tracking-wider">
<a class="text-on-surface/60 hover:text-primary transition-colors" href="/">Home</a>
<a class="text-on-surface/60 hover:text-primary transition-colors" href="/library">Oral Histories</a>
<a class="text-on-surface/60 hover:text-primary transition-colors" href="/welcome">Family Tree</a>
</nav>
<div class="w-10 h-10 rounded-full border-2 border-primary-container overflow-hidden">
<img id="navProfileImg" alt="User Profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBeIj-47I1LlWVmIAjspjAHdMHwDA3polca1tKTcuZO3ffFwTFMlIXFoFSpjY7RAfqg1AWn5zdPOB-DlD-0uBcEG9CvXzMotCnwMVUYohQOaRKDmppwOvsE_k5yqws9HDU3T0AGrbqMrGfzB5LM374qGPUIhLCyj5GXRRaR3yO_-LVjfhE4KgZ140W_GCJ8SGUEF4CNipizSGL6ZZS77Qh7pKc5q_nMMuth2fQynCqvtc6A4pRaL9KLeESYNDASmYe5oZUqHd8B5-ZY">
</div>
</div>
</div>
</header>
<script>
  setTimeout(() => {
    try {
      if(window.App && App.currentUser) {
        document.getElementById("navProfileImg").src = App.avatarUrl(App.currentUser);
      }
    }catch(e){}
  }, 100);
</script>

  <main style="min-height:100vh;padding:100px 1.5rem 120px;max-width:28rem;margin:0 auto;display:flex;flex-direction:column;align-items:center">
    <!-- Header -->
    <div style="text-align:center;margin-bottom:3rem;width:100%">
      <div style="width:80px;height:80px;background:var(--primary-fixed);border-radius:50%;margin:0 auto 1.5rem;display:flex;align-items:center;justify-content:center">
        <span class="material-symbols-outlined filled" style="color:var(--primary);font-size:2rem">local_fire_department</span>
      </div>
      <h2 style="font-family:var(--font-headline);font-size:1.875rem;font-weight:900;color:var(--on-surface);margin-bottom:0.5rem" id="authTitle">Welcome Back</h2>
      <p style="color:var(--on-surface-variant);font-size:0.875rem" id="authSubtitle">Sign in to continue your journey</p>
    </div>

    <!-- Mode Toggle -->
    <div style="display:flex;background:var(--surface-container-highest);border-radius:9999px;padding:4px;margin-bottom:2rem;width:100%" id="authNav">
      <button onclick="switchMode('login')" id="loginTab"
              style="flex:1;height:48px;border-radius:9999px;font-family:var(--font-label);font-weight:600;font-size:0.875rem;background:var(--primary);color:white;transition:all 0.3s">
        Sign In
      </button>
      <button onclick="switchMode('signup')" id="signupTab"
              style="flex:1;height:48px;border-radius:9999px;font-family:var(--font-label);font-weight:600;font-size:0.875rem;background:transparent;color:var(--on-surface-variant);transition:all 0.3s">
        Create Account
      </button>
    </div>

    <!-- Auth Form -->
    <form id="authForm" style="width:100%;display:flex;flex-direction:column;gap:1.5rem" onsubmit="handleAuth(event)">
      <!-- Name (signup only) -->
      <div id="nameGroup" class="form-group" style="display:none">
        <label class="form-label" for="fullName">Full Name</label>
        <div class="input-wrapper">
          <input type="text" id="fullName" class="form-input" placeholder="Enter your full name">
        </div>
      </div>

      <!-- Email / Phone -->
      <div class="form-group" id="identifierGroup">
        <label class="form-label" for="emailPhone">Email or Phone</label>
        <div class="input-wrapper">
          <input type="text" id="emailPhone" class="form-input" placeholder="email@example.com or +250..." required>
        </div>
      </div>

      <!-- Password -->
      <div class="form-group" id="passwordGroup">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <label class="form-label" for="password">Password</label>
          <a href="#" onclick="switchMode('forgot'); return false;" style="font-size:0.75rem;color:var(--primary);font-weight:600;margin-bottom:0.5rem">Forgot?</a>
        </div>
        <div class="input-wrapper">
          <input type="password" id="password" class="form-input" placeholder="Enter your password">
          <button type="button" onclick="togglePassword('password')" aria-label="Toggle password visibility">
            <span class="material-symbols-outlined" id="passToggle">visibility_off</span>
          </button>
        </div>
      </div>

      <!-- OTP Group (hidden by default) -->
      <div id="otpGroup" class="form-group" style="display:none;text-align:center">
        <label class="form-label" style="text-align:center">Enter Verification Code</label>
        <p style="font-size:0.8rem;color:var(--on-surface-variant);margin-bottom:1rem">A 6-digit code was sent to <span id="targetIdentifier" style="font-weight:700"></span></p>
        <div class="input-wrapper">
          <input type="text" id="otpCode" class="form-input" maxlength="6" placeholder="0 0 0 0 0 0" style="text-align:center;letter-spacing:0.5em;font-size:1.5rem;font-weight:800">
        </div>
        <p style="font-size:0.75rem;margin-top:1rem;color:var(--on-surface-variant)">Didn't receive it? <a href="#" onclick="handleAuth(event, true); return false;" style="color:var(--primary);font-weight:700">Resend</a></p>
      </div>

      <!-- New Password Group (reset only) -->
      <div id="newPassGroup" class="form-group" style="display:none">
        <label class="form-label" for="newPassword">New Password</label>
        <div class="input-wrapper">
          <input type="password" id="newPassword" class="form-input" placeholder="Minimum 6 characters">
          <button type="button" onclick="togglePassword('newPassword')" aria-label="Toggle password visibility">
            <span class="material-symbols-outlined">visibility_off</span>
          </button>
        </div>
      </div>

      <!-- Role Selection (signup only) -->
      <div id="roleGroup" class="form-group" style="display:none">
        <label class="form-label">I am joining as...</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem">
          <button type="button" onclick="selectRole('elder')" id="roleElder"
                  style="padding:1rem;border-radius:2rem 0.5rem 2rem 0.5rem;background:var(--surface-container-highest);text-align:center;transition:all 0.4s;border:2.5px solid transparent;overflow:hidden">
            <div style="width:100%;aspect-ratio:3/4;margin-bottom:0.75rem;border-radius:1.5rem 0.4rem 1.5rem 0.4rem;overflow:hidden">
              <img src="/assets/images/elder.png" style="width:100%;height:100%;object-fit:cover;filter:grayscale(100%) contrast(1.1);transition:transform 0.4s">
            </div>
            <span style="font-family:var(--font-label);font-weight:700;font-size:0.9rem;color:var(--on-surface)">Elder</span>
            <p style="font-size:0.7rem;color:var(--on-surface-variant);margin-top:0.25rem;text-transform:uppercase;letter-spacing:0.05em">Share Legacy</p>
          </button>
          <button type="button" onclick="selectRole('youth')" id="roleYouth"
                  style="padding:1rem;border-radius:0.5rem 2rem 0.5rem 2rem;background:var(--surface-container-highest);text-align:center;transition:all 0.4s;border:2.5px solid transparent;overflow:hidden">
            <div style="width:100%;aspect-ratio:3/4;margin-bottom:0.75rem;border-radius:0.4rem 1.5rem 0.4rem 1.5rem;overflow:hidden">
              <img src="/assets/images/youth.png" style="width:100%;height:100%;object-fit:cover;filter:grayscale(100%) contrast(1.1);transition:transform 0.4s">
            </div>
            <span style="font-family:var(--font-label);font-weight:700;font-size:0.9rem;color:var(--on-surface)">Youth</span>
            <p style="font-size:0.7rem;color:var(--on-surface-variant);margin-top:0.25rem;text-transform:uppercase;letter-spacing:0.05em">Learn & Connect</p>
          </button>
        </div>
      </div>

      <!-- Error Message -->
      <div id="errorMsg" style="display:none;padding:1rem;background:var(--error-container);color:var(--on-error-container);border-radius:0.75rem;font-size:0.875rem;text-align:center"></div>

      <!-- Submit -->
      <button type="submit" id="submitBtn" class="btn-primary" style="width:100%;height:56px;font-size:1rem">
        Sign In
      </button>
    </form>

    <!-- Bottom Link -->
    <div id="authBottom" style="margin-top:2rem;text-align:center;font-size:0.875rem;color:var(--on-surface-variant)">
      <span id="switchText">Don't have an account?</span>
      <a href="#" onclick="switchMode(currentMode === 'login' ? 'signup' : 'login'); return false;" style="color:var(--primary);font-weight:700;margin-left:0.25rem" id="switchLink">Create one</a>
    </div>

    <!-- Back to Sign In -->
    <a href="#" id="backLink" onclick="switchMode('login'); return false;" 
       style="display:none;margin-top:2rem;text-align:center;color:var(--on-surface-variant);font-size:0.875rem;font-weight:600">
       <span class="material-symbols-outlined" style="font-size:1rem;vertical-align:middle">arrow_back</span> Back to Sign In
    </a>
  </main>

  <script src="/js/api.js?v=4"></script>
  <script src="/js/app.js?v=4"></script>
  <script src="/js/components.js?v=4"></script>
  <script>
    let currentMode = 'login';
    let selectedRole = 'youth';
    let otpContext = null; // { identifier, purpose }

    // Init
    document.addEventListener('DOMContentLoaded', () => {
      // 🛡️ Final Auth Shield: If we somehow hit this page with a corrupted object, clear it.
      if (localStorage.getItem('inkomoko_user') === 'undefined') {
        localStorage.clear();
      }

      const params = new URLSearchParams(window.location.search);
      const isSignupParam = params.get('mode') === 'signup' || params.get('role');
      if (isSignupParam) switchMode('signup');
      if (params.get('role')) selectRole(params.get('role'));
      
      // Safety: ensure default state is consistent
      if (!isSignupParam && currentMode !== 'login') {
        switchMode('login');
      }
    });

    function switchMode(mode) {
      currentMode = mode;
      const isLogin = mode === 'login';
      const isSignup = mode === 'signup';
      const isOTP = mode === 'otp';
      const isForgot = mode === 'forgot';
      const isReset = mode === 'reset';

      // Header UI
      document.getElementById('authNav').style.display = (isLogin || isSignup) ? 'flex' : 'none';
      if (isLogin || isSignup) {
        document.getElementById('loginTab').style.background = isLogin ? 'var(--primary)' : 'transparent';
        document.getElementById('loginTab').style.color = isLogin ? 'white' : 'var(--on-surface-variant)';
        document.getElementById('signupTab').style.background = isSignup ? 'var(--primary)' : 'transparent';
        document.getElementById('signupTab').style.color = isSignup ? 'white' : 'var(--on-surface-variant)';
      }

      // Groups visibility
      document.getElementById('nameGroup').style.display = isSignup ? 'block' : 'none';
      document.getElementById('identifierGroup').style.display = (isLogin || isSignup || isForgot || isReset) ? 'block' : 'none';
      document.getElementById('passwordGroup').style.display = (isLogin || isSignup) ? 'block' : 'none';
      document.getElementById('otpGroup').style.display = (isOTP || isReset) ? 'block' : 'none';
      document.getElementById('newPassGroup').style.display = isReset ? 'block' : 'none';
      document.getElementById('roleGroup').style.display = isSignup ? 'block' : 'none';

      // Titles
      const titles = {
        login: ['Welcome Back', 'Sign in to continue your journey'],
        signup: ['Create Account', 'Join the Living Archive community'],
        otp: ['Verify Identity', 'Enter the code sent to your device'],
        forgot: ['Reset Password', 'Enter your email/phone to receive a code'],
        reset: ['New Password', 'Create a secure new password']
      };
      
      document.getElementById('authTitle').textContent = titles[mode][0];
      document.getElementById('authSubtitle').textContent = titles[mode][1];
      
      // Submit Button text
      const btnText = {
        login: 'Sign In', signup: 'Create Account', otp: 'Verify Code',
        forgot: 'Send Reset Code', reset: 'Update Password'
      };
      document.getElementById('submitBtn').textContent = btnText[mode];
      
      // Bottom Links
      document.getElementById('authBottom').style.display = (isLogin || isSignup) ? 'block' : 'none';
      if (isLogin || isSignup) {
        document.getElementById('switchText').textContent = isLogin ? "Don't have an account?" : 'Already have an account?';
        document.getElementById('switchLink').textContent = isLogin ? 'Create one' : 'Sign in';
      }
      
      document.getElementById('backLink').style.display = (!isLogin && !isSignup) ? 'block' : 'none';
      document.getElementById('errorMsg').style.display = 'none';
    }

    function selectRole(role) {
      selectedRole = role;
      const elderBtn = document.getElementById('roleElder');
      const youthBtn = document.getElementById('roleYouth');
      elderBtn.style.borderColor = role === 'elder' ? 'var(--primary)' : 'transparent';
      elderBtn.style.background = role === 'elder' ? 'var(--primary-fixed)' : 'var(--surface-container-highest)';
      youthBtn.style.borderColor = role === 'youth' ? 'var(--secondary)' : 'transparent';
      youthBtn.style.background = role === 'youth' ? 'var(--secondary-fixed)' : 'var(--surface-container-highest)';
    }

    function togglePassword(id) {
      const input = document.getElementById(id);
      const btn = input.nextElementSibling;
      const icon = btn.querySelector('.material-symbols-outlined');
      if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = 'visibility';
      } else {
        input.type = 'password';
        icon.textContent = 'visibility_off';
      }
    }

    async function handleAuth(e, isResend = false) {
      if (e) e.preventDefault();
      const errorEl = document.getElementById('errorMsg');
      const submitBtn = document.getElementById('submitBtn');
      errorEl.style.display = 'none';

      // Prevent double submissions
      if (submitBtn.disabled) return;
      
      const originalBtnText = submitBtn.textContent;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Please wait...';
      submitBtn.style.opacity = '0.7';

      const emailPhone = document.getElementById('emailPhone').value.trim();
      const password = document.getElementById('password').value;
      const otpCode = document.getElementById('otpCode').value.trim();
      const newPassword = document.getElementById('newPassword').value;

      try {
        let result;

        // AUTH STEPS (Login/Signup)
        if (currentMode === 'login' || currentMode === 'signup') {
          const data = { 
            email: emailPhone.includes('@') ? emailPhone : null, 
            phone: !emailPhone.includes('@') ? emailPhone : null, 
            password: password 
          };
          
          if (currentMode === 'signup') {
            data.full_name = document.getElementById('fullName').value.trim();
            data.role = selectedRole;
            result = await API.signup(data);
          } else {
            result = await API.login(data);
          }

          if (result && result.otp_required) {
            console.log('OTP required for signup. Switching to OTP mode.');
            otpContext = { identifier: emailPhone, purpose: result.purpose || 'signup' };
            document.getElementById('targetIdentifier').textContent = emailPhone;
            switchMode('otp');
            return; // EXIT HERE
          }
        }

        // OTP VERIFICATION
        if (currentMode === 'otp') {
          console.log('Verifying OTP for:', otpContext);
          const otpResult = await API.verifyOTP({ identifier: otpContext.identifier, code: otpCode, purpose: otpContext.purpose });
          console.log('OTP verify result:', otpResult);
          if (otpResult && otpResult.token && otpResult.user) {
            API.setToken(otpResult.token);
            App.setUser(otpResult.user);
            console.log('User set, calling handleRedirect with:', otpResult.user);
            return handleRedirect(otpResult.user);
          }
        }

        // Handle immediate login/signup if OTP wasn't required
        if (result && result.token && result.user) {
          console.log('Auth successful (no OTP). Redirecting...');
          API.setToken(result.token);
          App.setUser(result.user);
          handleRedirect(result.user);
          return;
        }

        // FORGOT PASSWORD
        if (currentMode === 'forgot') {
          result = await API.forgotPassword(emailPhone);
          otpContext = { identifier: emailPhone, purpose: 'reset' };
          document.getElementById('targetIdentifier').textContent = emailPhone;
          switchMode('reset');
          return;
        }

        // RESET PASSWORD
        if (currentMode === 'reset') {
          result = await API.resetPassword({ identifier: otpContext.identifier, code: otpCode, new_password: newPassword });
          App.showToast('Password updated! Please sign in.', 'success');
          switchMode('login');
        }

      } catch (err) {
        console.error('Auth error:', err);
        errorEl.textContent = err.message || 'Something went wrong. Please try again.';
        errorEl.style.display = 'block';
        
        if (err.message.includes('401') || err.message.includes('Invalid credentials')) {
          errorEl.textContent = 'Invalid credentials. Please try again.';
        } else if (err.message.includes('OTP')) {
          errorEl.textContent = 'Invalid or expired verification code. Please request a new one.';
        }
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = originalBtnText;
        submitBtn.style.opacity = '1';
      }
    }

    function handleRedirect(user) {
      try {
        console.log('handleRedirect called with user:', user);
        
        if (!user || typeof user !== 'object') {
          console.warn('Redirect aborted: User object is null or invalid.');
          window.location.href = '/welcome';
          return;
        }
        
        console.log('User id:', user.id, 'role:', user.role, 'onboarding_status:', user.onboarding_status);
        
        const isCompleted = (user && user.onboarding_status === true);
        const role = user.role || 'youth';

        if (!isCompleted) {
          console.log('Redirecting to onboarding...');
          window.location.href = '/onboarding.html';
        } else {
          console.log('Redirecting to dashboard for role:', role);
          window.location.href = role === 'elder' ? '/elder-dashboard.html' : '/youth-dashboard.html';
        }
      } catch (err) {
        console.error('CRITICAL REDIRECT ERROR:', err);
        App.showToast('Redirection failed. Please try signing in again.', 'error');
      }
    }
  </script>
</body>
</html>
